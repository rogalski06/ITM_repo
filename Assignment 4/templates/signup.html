<!DOCTYPE html>
<html>
<head>
   <title>Sign Up - DigiBooth</title>


   <style>
       body {
           margin: 0;
           font-family: "Comic Sans MS", "Trebuchet MS", Arial, sans-serif;
           background: #f7f7f7;
           color: #111;
           text-align: center;
       }


       nav {
           margin: 25px;
       }


       nav a {
           display: inline-block;
           margin: 8px;
           padding: 10px 20px;
           border: 4px solid black;
           background: white;
           color: black;
           font-weight: bold;
           text-decoration: none;
           border-radius: 8px;
       }


       .title-sign {
           width: 520px;
           margin: 35px auto 25px;
           padding: 18px;
           border: 6px solid black;
           outline: 4px solid black;
           outline-offset: 8px;
           font-size: 46px;
           letter-spacing: 4px;
           background: white;
       }


       .form-box {
           width: 430px;
           margin: 40px auto;
           padding: 30px;
           border: 6px solid black;
           border-radius: 25px;
           background: white;
       }


       label {
           display: block;
           text-align: left;
           font-weight: bold;
           margin-top: 16px;
       }


       input {
           width: 95%;
           padding: 12px;
           margin-top: 6px;
           border: 4px solid black;
           font-size: 15px;
       }


       button {
           margin-top: 25px;
           padding: 12px 24px;
           border: 3px solid black;
           background: white;
           color: black;
           font-weight: bold;
           cursor: pointer;
       }


       .error-message {
           color: red;
           font-weight: bold;
       }
   </style>
</head>


<body>


<nav>
   <a href="/">Home</a>


   {% if session.get("username") %}
       <a href="/feed">Feed</a>
       <a href="/booth">Booth</a>
       <a href="/logout">Logout</a>
   {% else %}
       <a href="/signup">Sign Up</a>
       <a href="/signin">Sign In</a>
   {% endif %}
</nav>


<div class="title-sign">SIGN UP</div>


<div class="form-box">
   <p>Sign up with your UH email to join DigiBooth.</p>


   {% if error %}
       <p class="error-message">{{ error }}</p>
   {% endif %}


   <form action="/signup_submit" method="POST">
       <label>Name:</label>
       <input type="text" name="name" placeholder="Enter your name" required>


       <label>Username:</label>
       <input type="text" name="username" placeholder="Choose a username" required>


       <label>Hawaii.edu Email:</label>
       <input type="email" name="email" placeholder="example@hawaii.edu" required>


       <button type="submit">Create Account</button>
   </form>
</div>


</body>
</html>
