<!DOCTYPE html>
<html>
<head>
   <title>Sign In - DigiBooth</title>


   <style>
       body {
           margin: 0;
           font-family: "Comic Sans MS", "Trebuchet MS", Arial, sans-serif;
           background: #f7f7f7;
           color: #111;
           text-align: center;
       }


       nav {
           margin: 25px;
       }


       nav a {
           display: inline-block;
           margin: 8px;
           padding: 10px 20px;
           border: 4px solid black;
           background: white;
           color: black;
           font-weight: bold;
           text-decoration: none;
           border-radius: 8px;
       }


       .title-sign {
           width: 520px;
           margin: 35px auto 25px;
           padding: 18px;
           border: 6px solid black;
           outline: 4px solid black;
           outline-offset: 8px;
           font-size: 46px;
           letter-spacing: 4px;
           background: white;
       }


       .form-box {
           width: 430px;
           margin: 40px auto;
           padding: 30px;
           border: 6px solid black;
           border-radius: 25px;
           background: white;
       }


       label {
           display: block;
           text-align: left;
           font-weight: bold;
           margin-top: 16px;
       }


       input {
           width: 95%;
           padding: 12px;
           margin-top: 6px;
           border: 4px solid black;
           font-size: 15px;
       }


       button {
           margin-top: 25px;
           padding: 12px 24px;
           border: 3px solid black;
           background: white;
           color: black;
           font-weight: bold;
           cursor: pointer;
       }


       .button-link {
           display: inline-block;
           margin-top: 18px;
           color: black;
           font-weight: bold;
           text-decoration: underline;
       }


       .error {
           color: red;
           font-weight: bold;
       }


       .message {
           color: green;
           font-weight: bold;
       }
   </style>
</head>


<body>


<nav>
   <a href="/">Home</a>


   {% if session.get("username") %}
       <a href="/feed">Feed</a>
       <a href="/booth">Booth</a>
       <a href="/logout">Logout</a>
   {% else %}
       <a href="/signup">Sign Up</a>
       <a href="/signin">Sign In</a>
   {% endif %}
</nav>


<div class="title-sign">SIGN IN</div>


<div class="form-box">
   {% if error %}
       <p class="error">{{ error }}</p>
   {% endif %}


   {% if message %}
       <p class="message">{{ message }}</p>
   {% endif %}


   <form action="/signin_submit" method="POST">
       <label>Username or Email:</label>
       <input type="text" name="username_or_email" placeholder="Enter username or email" required>


       <button type="submit">Sign In</button>
   </form>


   <p>Don't have an account?</p>
   <a class="button-link" href="/signup">Create Account</a>
</div>


</body>
</html>
